        /* Admin Panel Style */
        .admin-panel { background: #1e293b; padding: 25px; border-radius: 15px; margin: -30px auto 30px auto; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 450px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }

        button:hover { background: #7dd3fc; transform: translateY(-2px); }

        /* Listing Grid */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; position: relative; transition: 0.3s; }
        .card:hover { border-color: #38bdf8; transform: scale(1.02); }
        .card h3 { margin-top: 0; color: #f8fafc; }
        .price { color: #4ade80; font-size: 1.6rem; font-weight: bold; margin: 15px 0; }
        .badge { background: #334155; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; color: #94a3b8; }
        
        .delete-btn { background: #ef4444; color: white; padding: 5px 10px; font-size: 0.7rem; margin-top: 15px; width: auto; opacity: 0.6; }
        .delete-btn:hover { opacity: 1; background: #b91c1c; }
    </style>
